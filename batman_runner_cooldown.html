
<style>
  #game-wrap { position: relative; width: 100%; height: 420px; background: #0a0a1a; overflow: hidden; border-radius: var(--border-radius-lg); cursor: pointer; user-select: none; }
  #hud { position: absolute; top: 12px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: center; z-index: 10; font-family: var(--font-mono); font-size: 14px; color: #ffe033; pointer-events: none; }
  #cooldown-wrap { display: flex; align-items: center; gap: 8px; }
  #cd-icon { font-size: 18px; line-height: 1; }
  #cd-bar-bg { width: 80px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; border: 0.5px solid rgba(255,224,51,0.3); }
  #cd-bar { height: 100%; width: 100%; background: #ffe033; border-radius: 4px; transition: background 0.1s; }
  #cd-label { font-size: 11px; color: rgba(255,224,51,0.7); min-width: 28px; }
  #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; z-index: 20; pointer-events: none; }
  #msg h2 { font-size: 28px; font-weight: 500; color: #ffe033; margin: 0 0 8px; }
  #msg p { font-size: 14px; color: #aaa; margin: 0 0 16px; }
  #start-btn { background: #ffe033; color: #000; border: none; padding: 10px 28px; border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; cursor: pointer; pointer-events: all; }
  #start-btn:hover { background: #ffd000; }
</style>

<div id="game-wrap">
  <div id="hud">
    <span>⚡ SCORE: <span id="score-display">0</span></span>
    <div id="cooldown-wrap">
      <div id="cd-icon">🪃</div>
      <div id="cd-bar-bg"><div id="cd-bar"></div></div>
      <div id="cd-label">READY</div>
    </div>
    <span>❤️ <span id="lives-display">3</span></span>
  </div>
  <canvas id="gc"></canvas>
  <div id="msg">
    <h2>🦇 BATMAN RUNNER</h2>
    <p>Click or tap to throw Batarangs<br>Destroy enemies before they reach you!</p>
    <button id="start-btn">START GAME</button>
  </div>
</div>

<script>
const wrap = document.getElementById('game-wrap');
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score-display');
const livesEl = document.getElementById('lives-display');
const msg = document.getElementById('msg');
const startBtn = document.getElementById('start-btn');
const cdBar = document.getElementById('cd-bar');
const cdLabel = document.getElementById('cd-label');
const cdIcon = document.getElementById('cd-icon');

const CD_MAX = 55; // frames (~0.9s at 60fps)
let cooldown = 0; // 0 = ready, > 0 = cooling down

let W, H, running = false, score = 0, lives = 3, frame = 0, spawnTimer = 0, spawnRate = 120, gameOver = false;
let enemies = [], batarangs = [], particles = [], buildings = [], raindrops = [], lightningTimer = 0, lightningAlpha = 0;
let capePoints = [], scorePopups = [];

function resize() {
  W = canvas.width = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
  buildBuildings();
  initRain();
}

function buildBuildings() {
  buildings = [];
  let x = 0;
  while (x < W * 2.5) {
    const w = 40 + Math.random() * 80;
    const h = 60 + Math.random() * 140;
    buildings.push({ x, w, h, color: `hsl(220,15%,${8 + Math.random()*10}%)` });
    x += w + 2 + Math.random() * 20;
  }
}

function initRain() {
  raindrops = [];
  for (let i = 0; i < 120; i++) {
    raindrops.push({ x: Math.random()*W, y: Math.random()*H, speed: 6+Math.random()*6, len: 8+Math.random()*10 });
  }
}

const GROUND = () => H - 60;
const BAT_X = 80;
let batman = { y: 0, vy: 0, runFrame: 0, runTimer: 0, hitFlash: 0 };
let scrollX = 0;
let flickeringWindows = [], windowFlickerTimer = 0;
let stars = [];

function resetBatman() {
  batman.y = GROUND(); batman.vy = 0; batman.runFrame = 0; batman.runTimer = 0; batman.hitFlash = 0;
  capePoints = [];
  for (let i = 0; i < 8; i++) capePoints.push({ x: BAT_X - i*4, y: GROUND()-20+i*4, vx: 0, vy: 0 });
}

function initStars() {
  stars = [];
  for (let i = 0; i < 60; i++) stars.push({ x: Math.random()*W, y: Math.random()*(H*0.6), s: Math.random()>0.8?2:1, twinkle: Math.random()*100 });
}

function updateCDUI() {
  const pct = cooldown <= 0 ? 1 : 1 - (cooldown / CD_MAX);
  cdBar.style.width = (pct * 100) + '%';
  if (cooldown <= 0) {
    cdBar.style.background = '#ffe033';
    cdLabel.textContent = 'READY';
    cdLabel.style.color = '#ffe033';
    cdIcon.style.opacity = '1';
    cdIcon.style.filter = 'none';
  } else {
    const t = pct;
    // color shifts red → orange → yellow as it refills
    const r = 255;
    const g = Math.floor(t * 200);
    cdBar.style.background = `rgb(${r},${g},0)`;
    cdLabel.textContent = (cooldown / 60).toFixed(1) + 's';
    cdLabel.style.color = 'rgba(255,150,50,0.8)';
    cdIcon.style.opacity = '0.4';
    cdIcon.style.filter = 'grayscale(1)';
  }
}

// Cooldown ring drawn on canvas at throw point
let cdRings = [];

function drawBuildings(sx) {
  buildings.forEach(b => {
    const bx = ((b.x - sx) % (W*2+400) + W*2+400) % (W*2+400) - 200;
    if (bx > W+100 || bx+b.w < -100) return;
    ctx.fillStyle = b.color;
    ctx.fillRect(bx, GROUND()-b.h, b.w, b.h);
    for (let wy = 8; wy < b.h-8; wy += 16) {
      for (let wx = 6; wx < b.w-6; wx += 14) {
        const seed = Math.floor(bx/b.w)*1000+wx*10+wy;
        const on = ((seed*2654435761)%7 !== 0);
        const flicker = flickeringWindows.includes(seed);
        ctx.fillStyle = flicker ? 'rgba(255,80,80,0.6)' : on ? 'rgba(255,220,50,0.18)' : 'rgba(0,0,0,0.1)';
        ctx.fillRect(bx+wx, GROUND()-b.h+wy, 6, 8);
      }
    }
    ctx.fillStyle = frame%60<30?'#ff3333':'transparent';
    ctx.fillRect(bx+b.w/2-1, GROUND()-b.h-10, 2, 10);
  });
}

function drawGround() {
  ctx.fillStyle = '#111122';
  ctx.fillRect(0, GROUND(), W, H-GROUND());
  const grd = ctx.createLinearGradient(0, GROUND(), 0, GROUND()+20);
  grd.addColorStop(0,'rgba(255,224,51,0.18)'); grd.addColorStop(1,'transparent');
  ctx.fillStyle = grd; ctx.fillRect(0, GROUND(), W, 20);
  ctx.fillStyle='#ffe033'; ctx.fillRect(0, GROUND(), W, 2);
  for (let i=0;i<W;i+=48) {
    const dx=((i-scrollX*0.5)%W+W)%W;
    ctx.fillStyle='#333355'; ctx.fillRect(dx, GROUND()+28, 28, 4);
  }
  for (let i=60;i<W-60;i+=200) {
    const px=((i-scrollX*0.3)%W+W)%W;
    ctx.fillStyle='rgba(100,150,255,0.07)';
    ctx.beginPath(); ctx.ellipse(px, GROUND()+45, 30, 6, 0, 0, Math.PI*2); ctx.fill();
  }
}

function updateCape() {
  const anchor = {x: BAT_X-6, y: batman.y-28};
  const windX = -1.5 - Math.sin(frame*0.03)*0.5;
  const windY = Math.sin(frame*0.07)*0.3;
  capePoints[0].x = anchor.x; capePoints[0].y = anchor.y;
  for (let i=1;i<capePoints.length;i++) {
    const p=capePoints[i], prev=capePoints[i-1];
    p.vx += (prev.x-p.x)*0.15 + windX*0.4;
    p.vy += (prev.y-p.y)*0.15 + 0.3 + windY;
    p.vx *= 0.75; p.vy *= 0.75;
    p.x += p.vx; p.y += p.vy;
    if (p.y > batman.y+24) { p.y=batman.y+24; p.vy*=-0.3; }
  }
}

function drawBatman() {
  updateCape();
  const x=BAT_X, y=batman.y;
  const t=batman.runFrame;
  const onGround=batman.y>=GROUND()-2;
  const legSwing=onGround?Math.sin(t*0.4)*10:0;
  const bobY=onGround?Math.abs(Math.sin(t*0.4))*-3:0;

  ctx.save(); ctx.translate(x, y+bobY);
  if (batman.hitFlash>0) { ctx.globalAlpha=0.5+Math.sin(batman.hitFlash*0.8)*0.5; batman.hitFlash--; }

  ctx.beginPath();
  ctx.moveTo(capePoints[0].x-x, capePoints[0].y-y-bobY);
  for (let i=1;i<capePoints.length;i++) ctx.lineTo(capePoints[i].x-x, capePoints[i].y-y-bobY);
  ctx.lineTo(2,24); ctx.lineTo(2,-30); ctx.closePath();
  ctx.fillStyle='#12123a'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(-2,-28);
  ctx.lineTo(capePoints[2].x-x, capePoints[2].y-y-bobY);
  ctx.lineTo(capePoints[3].x-x, capePoints[3].y-y-bobY);
  ctx.lineTo(0,10); ctx.closePath();
  ctx.fillStyle='rgba(80,80,180,0.18)'; ctx.fill();

  ctx.fillStyle='#1c1c1c'; ctx.fillRect(-10,-28,20,30);
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-8,-20); ctx.lineTo(8,-20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-8,-10); ctx.lineTo(8,-10); ctx.stroke();

  const glowPulse=0.6+Math.sin(frame*0.08)*0.4;
  ctx.shadowColor=`rgba(255,224,51,${glowPulse*0.8})`; ctx.shadowBlur=6*glowPulse;
  ctx.fillStyle='#ffe033';
  ctx.beginPath(); ctx.ellipse(0,-14,7,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1c1c1c'; ctx.fillRect(-4,-18,8,8); ctx.shadowBlur=0;

  ctx.fillStyle='#1c1c1c';
  ctx.beginPath(); ctx.ellipse(0,-34,9,10,0,0,Math.PI*2); ctx.fill();
  const earLean=onGround?Math.sin(t*0.2)*0.08:0;
  ctx.save(); ctx.rotate(earLean);
  ctx.beginPath(); ctx.moveTo(-6,-40); ctx.lineTo(-10,-54); ctx.lineTo(-2,-42); ctx.closePath(); ctx.fill(); ctx.restore();
  ctx.save(); ctx.rotate(-earLean);
  ctx.beginPath(); ctx.moveTo(6,-40); ctx.lineTo(10,-54); ctx.lineTo(2,-42); ctx.closePath(); ctx.fill(); ctx.restore();

  ctx.shadowColor='rgba(255,255,255,0.9)'; ctx.shadowBlur=4;
  ctx.fillStyle='#fff'; ctx.fillRect(-7,-37,5,2); ctx.fillRect(2,-37,5,2); ctx.shadowBlur=0;

  const ly=4;
  ctx.fillStyle='#1c1c1c';
  ctx.save(); ctx.translate(-4,ly); ctx.rotate(legSwing*0.05); ctx.fillRect(-3,0,6,22); ctx.restore();
  ctx.save(); ctx.translate(4,ly); ctx.rotate(-legSwing*0.05); ctx.fillRect(-3,0,6,22); ctx.restore();
  ctx.fillStyle='#111';
  const lbx=onGround?Math.sin(t*0.4)*3:0;
  ctx.fillRect(-8+lbx,20+ly,8,8); ctx.fillRect(2-lbx,20+ly,8,8);

  // cooldown ring around batman's hand
  if (cooldown > 0) {
    const pct = 1 - cooldown/CD_MAX;
    const r=18, cx2=10, cy2=-16;
    ctx.strokeStyle='rgba(255,224,51,0.15)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(cx2,cy2,r,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(255,224,51,0.85)'; ctx.lineWidth=3;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.arc(cx2,cy2,r,-Math.PI/2,-Math.PI/2+pct*Math.PI*2); ctx.stroke();
    ctx.lineCap='butt';
    // ready flash
  } else {
    // brief ready flash ring
    const rf = (frame % 90);
    if (rf < 12) {
      ctx.strokeStyle=`rgba(255,224,51,${0.7*(1-rf/12)})`;
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(10,-16,18+rf,0,Math.PI*2); ctx.stroke();
    }
  }

  ctx.restore();
}

function drawBatarang(b) {
  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.spin);
  ctx.shadowColor='rgba(255,224,51,0.7)'; ctx.shadowBlur=10;
  ctx.fillStyle='#ffe033';
  ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(14,2); ctx.lineTo(0,-1); ctx.lineTo(-14,2); ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();
  for (let i=1;i<=3;i++) {
    ctx.globalAlpha=0.15/i; ctx.fillStyle='#ffe033';
    ctx.save(); ctx.translate(b.x-b.vx*i*0.5,b.y-b.vy*i*0.5); ctx.rotate(b.spin-b.spinV*i);
    ctx.beginPath(); ctx.moveTo(0,-5); ctx.lineTo(12,2); ctx.lineTo(0,-1); ctx.lineTo(-12,2); ctx.closePath(); ctx.fill(); ctx.restore();
  }
  ctx.globalAlpha=1;
}

function drawEnemy(e) {
  ctx.save(); ctx.translate(e.x,e.y);
  if (e.type!=='drone') { ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.ellipse(0,2,12,4,0,0,Math.PI*2); ctx.fill(); }
  if (e.type==='thug') {
    const ls=Math.sin(e.runT*0.35)*10, bob=Math.abs(Math.sin(e.runT*0.35))*-2;
    ctx.translate(0,bob);
    ctx.fillStyle='#7a1a1a'; ctx.fillRect(-8,-30,16,28);
    ctx.strokeStyle='#9b2222'; ctx.lineWidth=1; ctx.strokeRect(-8,-30,16,28);
    ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.ellipse(0,-38,9,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#222'; ctx.fillRect(-10,-48,20,10);
    ctx.fillStyle='#4a0a0a';
    ctx.save(); ctx.translate(-4,-2); ctx.rotate(ls*0.05); ctx.fillRect(-3,0,6,20); ctx.restore();
    ctx.save(); ctx.translate(4,-2); ctx.rotate(-ls*0.05); ctx.fillRect(-3,0,6,20); ctx.restore();
    ctx.fillStyle='#222';
    const fx=Math.sin(e.runT*0.35)*3;
    ctx.fillRect(-9+fx,16,8,6); ctx.fillRect(-1-fx,16,8,6);
    ctx.fillStyle='#7a1a1a';
    ctx.save(); ctx.translate(-10,-22); ctx.rotate(ls*0.06); ctx.fillRect(-2,0,5,16); ctx.restore();
    ctx.save(); ctx.translate(8,-22); ctx.rotate(-ls*0.06); ctx.fillRect(-2,0,5,16); ctx.restore();
  } else if (e.type==='joker') {
    const ls2=Math.sin(e.runT*0.35)*10, bob2=Math.abs(Math.sin(e.runT*0.35))*-2;
    ctx.translate(0,bob2);
    ctx.fillStyle='#6a0dad'; ctx.fillRect(-9,-30,18,28);
    ctx.fillStyle='#f5c518'; ctx.beginPath(); ctx.ellipse(0,-38,9,10,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2ecc40';
    for (let i=-6;i<=6;i+=4) { const hw=Math.sin(frame*0.1+i)*2; ctx.beginPath(); ctx.ellipse(i,-48+hw,3,7,0.2*(i/6),0,Math.PI*2); ctx.fill(); }
    ctx.strokeStyle='#c0392b'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,-34,5,0.1,Math.PI-0.1); ctx.stroke();
    ctx.fillStyle='#ff4444'; ctx.beginPath(); ctx.ellipse(-4,-40,2,2,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4,-40,2,2,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#4a0070';
    ctx.save(); ctx.translate(-4,-2); ctx.rotate(ls2*0.05); ctx.fillRect(-3,0,6,20); ctx.restore();
    ctx.save(); ctx.translate(4,-2); ctx.rotate(-ls2*0.05); ctx.fillRect(-3,0,6,20); ctx.restore();
    ctx.fillStyle='#4a0070';
    const fx2=Math.sin(e.runT*0.35)*3;
    ctx.fillRect(-9+fx2,16,8,6); ctx.fillRect(-1-fx2,16,8,6);
    ctx.fillStyle='#6a0dad';
    ctx.save(); ctx.translate(-10,-22); ctx.rotate(ls2*0.06); ctx.fillRect(-2,0,5,16); ctx.restore();
    ctx.save(); ctx.translate(8,-22); ctx.rotate(-ls2*0.06); ctx.fillRect(-2,0,5,16); ctx.restore();
  } else {
    const hover=Math.sin(e.floatT*0.06)*3; ctx.translate(0,hover);
    ctx.shadowColor='rgba(50,120,255,0.6)'; ctx.shadowBlur=12;
    ctx.fillStyle='#1e4d8c'; ctx.beginPath(); ctx.ellipse(0,0,18,7,0,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#ffe033'; ctx.beginPath(); ctx.ellipse(0,0,6,6,0,0,Math.PI*2); ctx.fill();
    const rot=e.runT*0.25;
    ctx.strokeStyle='rgba(180,210,255,0.7)'; ctx.lineWidth=2;
    [0,Math.PI/3,Math.PI*2/3].forEach(a=>{ctx.save();ctx.rotate(rot+a);ctx.beginPath();ctx.moveTo(-22,0);ctx.lineTo(22,0);ctx.stroke();ctx.restore();});
    const lp=0.5+Math.sin(e.runT*0.2)*0.5;
    ctx.shadowColor=`rgba(255,50,50,${lp})`; ctx.shadowBlur=8*lp;
    ctx.fillStyle=`rgb(255,${Math.floor(50*(1-lp))},50)`;
    ctx.beginPath(); ctx.ellipse(16,0,4,4,0,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    if (lp>0.8&&e.x<W*0.7) { ctx.strokeStyle=`rgba(255,50,50,${(lp-0.8)*3})`; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(48,0); ctx.stroke(); }
  }
  if (e.hp<e.maxHp) {
    ctx.fillStyle='#333'; ctx.fillRect(-16,-58,32,5);
    ctx.fillStyle=e.hp/e.maxHp>0.5?'#2ecc40':'#e74c3c'; ctx.fillRect(-16,-58,32*(e.hp/e.maxHp),5);
  }
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha=p.life/p.maxLife;
    if (p.type==='spark') {
      ctx.strokeStyle=p.color; ctx.lineWidth=p.size*0.5;
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-p.vx*3,p.y-p.vy*3); ctx.stroke();
    } else if (p.type==='ring') {
      ctx.strokeStyle=p.color; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2); ctx.stroke(); p.radius+=2;
    } else {
      ctx.fillStyle=p.color; ctx.fillRect(p.x-2,p.y-2,p.size,p.size);
    }
  });
  ctx.globalAlpha=1;
}

// "NOT READY" shake indicator on click during cooldown
let shakeTimer = 0;
function drawCooldownDenied() {
  if (shakeTimer > 0) {
    const t2 = shakeTimer / 20;
    ctx.save();
    ctx.font = `500 13px var(--font-mono)`;
    ctx.textAlign = 'center';
    ctx.globalAlpha = t2;
    ctx.fillStyle = '#ff4444';
    ctx.fillText('NOT READY', BAT_X, batman.y - 65 + Math.sin(shakeTimer*1.2)*3);
    ctx.restore();
    shakeTimer--;
  }
}

function drawRain() {
  ctx.strokeStyle='rgba(160,180,255,0.25)'; ctx.lineWidth=1;
  raindrops.forEach(r=>{ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x-2,r.y+r.len);ctx.stroke();});
}
function updateRain() {
  raindrops.forEach(r=>{ r.y+=r.speed; r.x-=1; if(r.y>H){r.y=-10;r.x=Math.random()*W;} if(r.x<0)r.x=W; });
}
function drawLightning() {
  if (lightningAlpha>0) { ctx.fillStyle=`rgba(200,220,255,${lightningAlpha*0.08})`; ctx.fillRect(0,0,W,H); lightningAlpha-=0.05; }
}

function spawnEnemy() {
  const types=['thug','thug','joker','drone'];
  const type=types[Math.floor(Math.random()*types.length)];
  const isDrone=type==='drone', baseHp=1+Math.floor(score/300);
  enemies.push({x:W+40,y:isDrone?GROUND()-60-Math.random()*80:GROUND(),type,speed:1.5+Math.random()*1.5+score*0.002,hp:baseHp,maxHp:baseHp,runT:0,floatT:Math.random()*100});
}

function throwBatarang(mx,my) {
  if (!running) return;
  if (cooldown > 0) { shakeTimer = 20; return; } // blocked!
  const angle=Math.atan2(my-batman.y,mx-BAT_X);
  batarangs.push({x:BAT_X+10,y:batman.y-20,vx:Math.cos(angle)*14,vy:Math.sin(angle)*14,spin:0,spinV:0.3});
  burst(BAT_X+10,batman.y-20,'#ffe033',4,'spark');
  cooldown = CD_MAX;
}

function burst(x,y,color,n,type='square') {
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:30,maxLife:30,color,size:3+Math.random()*4,type});}
  if(type!=='spark') particles.push({x,y,vx:0,vy:0,life:18,maxLife:18,color,size:1,type:'ring',radius:4});
}

function addScorePopup(x,y,val){scorePopups.push({x,y,val,life:50,maxLife:50});}
function drawScorePopups(){
  scorePopups.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle='#ffe033';
    ctx.font=`500 ${14+(1-p.life/p.maxLife)*6}px var(--font-mono)`; ctx.textAlign='center';
    ctx.fillText('+'+p.val,p.x,p.y); p.y-=0.8; p.life--;
  });
  ctx.globalAlpha=1; ctx.textAlign='left';
  scorePopups=scorePopups.filter(p=>p.life>0);
}

function drawMoon(){
  ctx.shadowColor='rgba(255,224,51,0.3)'; ctx.shadowBlur=30;
  ctx.fillStyle='#ffe033'; ctx.beginPath(); ctx.arc(W-70,60,28,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#0a0a1a'; ctx.save(); ctx.translate(W-70,60); ctx.rotate(Math.sin(frame*0.005)*0.05);
  ctx.beginPath(); ctx.moveTo(0,-10); ctx.bezierCurveTo(-12,-6,-14,6,-8,12); ctx.lineTo(0,8); ctx.lineTo(8,12); ctx.bezierCurveTo(14,6,12,-6,0,-10); ctx.fill(); ctx.restore();
  ctx.strokeStyle='rgba(255,224,51,0.08)'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.arc(W-70,60,40,0,Math.PI*2); ctx.stroke();
}
function drawStarsBg(){
  stars.forEach(s=>{const tw=0.3+Math.abs(Math.sin((frame+s.twinkle)*0.04))*0.7; ctx.globalAlpha=tw*0.6; ctx.fillStyle='#fff'; ctx.fillRect(s.x,s.y,s.s,s.s);});
  ctx.globalAlpha=1;
}

function update() {
  if (!running) return;
  frame++; scrollX+=2;
  batman.runTimer++; if(batman.runTimer%6===0)batman.runFrame++;

  // tick cooldown
  if (cooldown > 0) { cooldown--; }
  updateCDUI();

  lightningTimer++; if(lightningTimer>200+Math.random()*300){lightningTimer=0;lightningAlpha=1;}
  windowFlickerTimer++; if(windowFlickerTimer%40===0){flickeringWindows=[];if(Math.random()>0.7)for(let i=0;i<3;i++)flickeringWindows.push(Math.floor(Math.random()*9999));}

  if(batman.y<GROUND()){batman.vy+=0.7;batman.y+=batman.vy;if(batman.y>=GROUND()){batman.y=GROUND();batman.vy=0;}}

  batarangs.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.spin+=b.spinV;});
  batarangs=batarangs.filter(b=>b.x<W+20&&b.y<H+20&&b.x>-20);

  spawnTimer++; if(spawnTimer>=spawnRate){spawnTimer=0;spawnRate=Math.max(40,120-score*0.08);spawnEnemy();}
  enemies.forEach(e=>{e.x-=e.speed;e.runT++;if(e.type==='drone')e.y=(GROUND()-80-Math.sin(e.floatT*0.04)*30);e.floatT++;});

  batarangs.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      const dx=b.x-e.x,dy=b.y-e.y;
      if(Math.abs(dx)<22&&Math.abs(dy)<36){
        e.hp--; burst(e.x,e.y-20,'#ffe033',6,'spark'); batarangs.splice(bi,1);
        if(e.hp<=0){const pts=e.type==='joker'?50:e.type==='drone'?30:10;burst(e.x,e.y-20,e.type==='joker'?'#a020f0':'#c0392b',14);score+=pts;scoreEl.textContent=score;addScorePopup(e.x,e.y-40,pts);enemies.splice(ei,1);}
      }
    });
  });

  enemies.forEach((e,ei)=>{
    if(e.x<BAT_X+16){burst(BAT_X,batman.y-20,'#ff4444',20);enemies.splice(ei,1);lives--;livesEl.textContent=lives;batman.hitFlash=30;if(lives<=0)endGame();}
  });

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;});
  particles=particles.filter(p=>p.life>0);
  updateRain();
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#060614'; ctx.fillRect(0,0,W,H);
  drawStarsBg(); drawMoon(); drawLightning();
  drawBuildings(scrollX*0.6); drawRain(); drawGround();
  drawParticles(); batarangs.forEach(drawBatarang); enemies.forEach(drawEnemy);
  drawBatman(); drawScorePopups(); drawCooldownDenied();
}

function loop(){update();draw();if(running||!gameOver)requestAnimationFrame(loop);}

function startGame(){
  score=0;lives=3;frame=0;spawnTimer=0;spawnRate=120;gameOver=false;cooldown=0;
  enemies=[];batarangs=[];particles=[];scorePopups=[];scrollX=0;
  scoreEl.textContent='0';livesEl.textContent='3';
  resetBatman();initStars();initRain();
  updateCDUI();
  msg.style.display='none';running=true;loop();
}

function endGame(){
  running=false;gameOver=true;
  msg.style.display='block';
  msg.innerHTML=`<h2>💀 GOTHAM FALLS</h2><p>Score: <strong>${score}</strong></p><button id="start-btn" style="background:#ffe033;color:#000;border:none;padding:10px 28px;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;">PLAY AGAIN</button>`;
  document.getElementById('start-btn').onclick=startGame;
}

startBtn.onclick=startGame;
wrap.addEventListener('click',e=>{if(!running)return;const rect=wrap.getBoundingClientRect();throwBatarang(e.clientX-rect.left,e.clientY-rect.top);});
wrap.addEventListener('touchstart',e=>{if(!running)return;e.preventDefault();const rect=wrap.getBoundingClientRect();const t=e.touches[0];throwBatarang(t.clientX-rect.left,t.clientY-rect.top);},{passive:false});

resize();initStars();initRain();resetBatman();
(function idleLoop(){
  if(!running&&!gameOver){
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#060614';ctx.fillRect(0,0,W,H);
    drawStarsBg();drawMoon();drawBuildings(scrollX);drawRain();drawGround();drawBatman();
    updateRain();frame++;scrollX+=0.5;requestAnimationFrame(idleLoop);
  }
})();
</script>
